<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Login - NexHealth Pro</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="header">
    <div class="container">
      <div class="header-content">
        <h1>🏥 NexHealth Pro - Doctor Portal</h1>
        <a href="/" style="color: white; text-decoration: none; font-size: 14px;">← Back to Home</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="form-container">
      <h2 class="form-title">Doctor Login</h2>
      <form id="doctorLoginForm">
        <div class="form-group">
          <label for="doctorId">Doctor ID</label>
          <input type="text" id="doctorId" name="doctorId" required placeholder="e.g., doctor1">
          <small style="color: #999; margin-top: 5px; display: block;">Demo IDs: doctor1, doctor2, doctor3</small>
        </div>

        <div class="form-group">
          <label for="doctorPassword">Password</label>
          <input type="password" id="doctorPassword" name="doctorPassword" required placeholder="Enter your password">
          <small style="color: #999; margin-top: 5px; display: block;">Demo Password: pass123</small>
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <div class="form-footer">
        <p>Back to <a href="/">home page</a></p>
      </div>

      <div style="margin-top: 30px; padding: 20px; background: #fff3cd; border-radius: 8px; border-left: 4px solid #ffc107;">
        <strong style="color: #856404;">Demo Credentials:</strong>
        <p style="margin-top: 8px; color: #856404; font-size: 14px;">
          ID: doctor1, doctor2, or doctor3<br>
          Password: pass123
        </p>
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
