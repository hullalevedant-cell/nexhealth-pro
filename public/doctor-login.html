<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Login - NexHealth Pro</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="header">
    <div class="container">
      <div class="header-content">
        <h1>🏥 NexHealth Pro - Doctor Portal</h1>
        <a href="/" style="color: white; text-decoration: none; font-size: 14px;">← Back to Home</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="form-container">
      <h2 class="form-title">Doctor Login</h2>
      <form id="doctorLoginForm">
        <div class="form-group">
          <label for="doctorId">Doctor ID</label>
          <input type="text" id="doctorId" name="doctorId" required placeholder="Enter your Doctor ID">
        </div>

        <div class="form-group">
          <label for="doctorPassword">Password</label>
          <input type="password" id="doctorPassword" name="doctorPassword" required placeholder="Enter your password">
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <div class="form-footer">
        <p>Back to <a href="/">home page</a></p>
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
